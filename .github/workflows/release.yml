name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Freeze backend with PyInstaller
        working-directory: backend
        run: pyinstaller audiostem-backend.spec --clean --noconfirm

      - name: Copy backend bundle into Tauri resources
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/audiostem-backend | Out-Null
          Copy-Item -Path backend/dist/audiostem-backend/* -Destination src-tauri/resources/audiostem-backend -Recurse -Force

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build Tauri app
        working-directory: frontend
        run: npx tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioStem-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 14

      # Only pushing a tag like `v0.2.0` publishes an actual GitHub Release.
      # Plain pushes to main just build and upload the artifact above, so the
      # Releases page doesn't fill up with an entry for every commit.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: src-tauri/target/release/bundle/nsis/*.exe
